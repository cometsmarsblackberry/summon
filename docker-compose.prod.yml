services:
  web:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    build:
      context: .
      dockerfile: ${CADDY_DOCKERFILE:-Dockerfile.caddy}
    environment:
      - BASE_URL=${BASE_URL}
      - ORIGIN_HOSTNAME=${ORIGIN_HOSTNAME:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
